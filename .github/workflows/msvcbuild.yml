name: Build and conditionally release

on:
  push:
    branches:
      - release
    #paths:
    #- "**.cpp" # Only when code changes
    #- "**.h"
  workflow_dispatch: # Allow manual runs

jobs:
  build:
    runs-on: windows-2025-vs2026
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v2
      with:
        submodules: 'true'

    - name: Set up MSVC environment
      id: setup_msbuild
      uses: microsoft/setup-msbuild@v1

    - name: Build ovs-client
      id: build
      run: msbuild OpenVersus.sln /p:Configuration=Release /p:Platform=x64
      working-directory: ${{ github.workspace }}

    - name: Get current version
      id: version
      run: |
        $VERSION=(Get-Content .\VERSION).Replace("\r\n", '').Replace("\n", '')
        Write-Output -InputObject "current_version=$VERSION" >> $env:GITHUB_OUTPUT
        Write-Output -InputObject "project_name=OpenVersus" >> $env:GITHUB_OUTPUT
        Write-Output -InputObject "Project Version is: $VERSION"

    - name: Download xinput1_3 version of Ultimate ASI Loader
      id: loader_downloader
      run: |
        $VerbosePreference = 'Continue'
        [string] $BaseFilename = 'xinput1_3-x64'
        [string] $DownloadFilename = "${BaseFilename}.zip"
        [string] $DownloadURL = "https://github.com/ThirteenAG/Ultimate-ASI-Loader/releases/download/x64-latest/${DownloadFilename}"
        try
        {
          # Downloads are slow as balls if you don't turn off the progress bar, and it doesn't provide any useful information for a single file download
          $ProgressPreference = 'SilentlyContinue'
          Invoke-WebRequest -Uri "${DownloadURL}" -OutFile "${DownloadFilename}" -Verbose
        }
        catch
        {
          $DownloadError = $_
          Write-Error -Message "Failed to download ASI loader from: $($DownloadError.Exception.Message)"
          Write-Error -Exception $DownloadError
          throw $DownloadError
        }
        Expand-Archive -Path ".\${DownloadFilename}" -DestinationPath . -Verbose
        $Matches = $null
        $(Get-Content ".\${BaseFilename}.SHA512") | Where-Object { $_ -match '^Hash\W.+:\W+(?<FileHash>.*)$'} | Out-Null
        if ($null -eq $Matches -or $null -eq $Matches.FileHash)
        {
          Write-Error -Message "Failed to parse hash from .SHA512 file. Expected format: 'Hash <filename>: <hash>'"
          Write-Error -Message "SHA512 file content: $(Get-Content ".\${BaseFilename}.SHA512")"
          throw "Hash parsing failed"
        }
        if ($Matches.FileHash -ne $((Get-FileHash ".\xinput1_3.dll" -Algorithm SHA512).Hash))
        {
          Write-Error -Message "Downloaded file hash does not match expected hash. Expected: $($Matches.FileHash), Actual: $((Get-FileHash ".\$($BaseFilename.Replace('-x64', '.dll'))" -Algorithm SHA512).Hash)"
          throw "Hash mismatch"
        }

    - name: Create Release Zip
      id: zip
      env:
        PROJECT_NAME: ${{ steps.version.outputs.project_name }}
        PROJECT_VERSION: ${{ steps.version.outputs.current_version }}
      run: |
        $VerbosePreference = 'Continue'
        [string] $ProjectName = "${{ env.PROJECT_NAME }}"
        [string] $Version = "${{ env.PROJECT_VERSION }}"
        [string] $VersionName = "${ProjectName}_v${Version}"
        [string] $ASILoaderLicenseURL = 'https://raw.githubusercontent.com/ThirteenAG/Ultimate-ASI-Loader/refs/heads/master/license'
        [string] $ASILoaderLicenseFilename = 'LICENSE_Ultimate_ASI_Loader.txt'

        Invoke-WebRequest -Uri "$ASILoaderLicenseURL" -OutFile ".\${ASILoaderLicenseFilename}" -Verbose
        New-Item -ItemType Directory -Path ".\plugins" -Verbose
        Rename-Item -Path ".\sample.ini" -NewName "${ProjectName}.ini" -Verbose
        Rename-Item -Path ".\LICENSE" -NewName ".\LICENSE.txt" -Verbose
        Rename-Item -Path ".\VERSION" -NewName ".\VERSION.txt" -Verbose
        Move-Item -Path @(".\${ProjectName}.ini", ".\out\Release\Binaries\${ProjectName}.asi", ".\LICENSE.txt", ".\VERSION.txt") -Destination ".\plugins" -Verbose

        Write-Output -InputObject "Packing $ProjectName files into ${VersionName}.zip"
        Compress-Archive -Path @(".\plugins ", ".\xinput1_3.dll", ".\${ASILoaderLicenseFilename}") -DestinationPath "${VersionName}.zip" -Verbose

        Write-Output -InputObject "release_artifact=${VersionName}.zip" >> $env:GITHUB_OUTPUT
        Write-Output -InputObject "asi_path=.\out\Release\Binaries\${ProjectName}.asi" >> $env:GITHUB_OUTPUT

    - name: Upload Build Artifact
      id: upload
      uses: actions/upload-artifact@v7
      with:
        name: release-artifact
        path: ${{ steps.zip.outputs.release_artifact }}
        archive: false
        if-no-files-found: warn
        retention-days: 90
        overwrite: true

    - name: Create GitHub Release
      id: create_release
      if: github.ref_type == 'tag'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        PROJECT_NAME: ${{ steps.version.outputs.project_name }}
        PROJECT_VERSION: ${{ steps.version.outputs.current_version }}
        RELEASE_ARCHIVE: ${{ steps.zip.outputs.release_artifact }}
        RELEASE_ASI: ${{ steps.zip.outputs.asi_path }}
      uses: softprops/action-gh-release@v1
      with:
        files: ${{ env.RELEASE_ARCHIVE }}, ${{ env.RELEASE_ASI }}
        name: ${{env.PROJECT_NAME}} v${{ env.PROJECT_VERSION }}
        tag_name: ${{ env.PROJECT_VERSION }}
